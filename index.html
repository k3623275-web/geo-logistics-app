<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>科AI - 超级聚合平台</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0d0d14;--surface:#13131e;--surface2:#1a1a2a;--surface3:#222238;
  --border:#2c2c44;--border2:#383858;--text:#dde1f0;--text2:#8888aa;--text3:#5a5a7a;
  --accent:#7c6aef;--accent2:#a78bfa;--accent-glow:rgba(124,106,239,0.15);
  --green:#22c55e;--red:#ef4444;--orange:#f59e0b;
  --topbar-h:54px;--sidebar-w:200px;--sidebar-collapsed:56px;
}
html,body{height:100%;font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--text);overflow:hidden;user-select:none}

/* ── Top Bar ── */
.topbar{
  position:fixed;top:0;left:0;right:0;height:var(--topbar-h);
  background:rgba(13,13,20,0.9);backdrop-filter:blur(24px);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 18px;z-index:100;
}
.topbar-brand{display:flex;align-items:center;gap:10px;margin-right:24px}
.logo-hex svg{width:28px;height:28px;display:block}
.brand-text{font-size:16px;font-weight:700;letter-spacing:-.3px}
.brand-text span{background:linear-gradient(135deg,#c4b5fd,#f0abfc);-webkit-background-clip:text;-webkit-text-fill-color:transparent}

.topbar-nav{display:flex;gap:3px;flex:1}
.nav-item{
  padding:7px 16px;border-radius:7px;font-size:13px;font-weight:500;
  color:var(--text2);cursor:pointer;transition:all .15s;border:1px solid transparent;
}
.nav-item:hover{color:var(--text);background:var(--surface2)}
.nav-item.active{color:#fff;background:var(--surface2);border-color:var(--border2)}

.topbar-right{display:flex;align-items:center;gap:10px;margin-left:auto}
.btn-ghost{
  padding:6px 14px;border-radius:6px;font-size:12px;font-weight:500;
  border:1px solid var(--border2);color:var(--text2);cursor:pointer;transition:all .15s;
}
.btn-ghost:hover{color:var(--text);border-color:var(--accent2)}
.btn-primary{
  padding:6px 14px;border-radius:6px;font-size:12px;font-weight:500;
  background:var(--accent);color:#fff;cursor:pointer;border:none;transition:all .15s;
}
.btn-primary:hover{background:var(--accent2);box-shadow:0 2px 12px var(--accent-glow)}
.btn-lang{
  padding:6px 10px;border-radius:5px;font-size:11px;font-weight:600;
  border:1px solid var(--border2);background:var(--surface2);color:var(--text2);
  cursor:pointer;transition:all .15s;
}
.btn-lang:hover{color:var(--text);border-color:var(--accent)}

/* ── Layout ── */
.body{display:flex;height:100vh;padding-top:var(--topbar-h)}

/* ── Sidebar ── */
.sidebar{
  width:var(--sidebar-w);flex-shrink:0;background:var(--surface);
  border-right:1px solid var(--border);display:flex;flex-direction:column;
  transition:width .2s ease;overflow:hidden;position:relative;
}
.sidebar.collapsed{width:var(--sidebar-collapsed)}
.sidebar-toggle{
  position:absolute;right:-12px;top:50%;transform:translateY(-50%);
  width:24px;height:24px;border-radius:50%;background:var(--surface2);
  border:1px solid var(--border);cursor:pointer;z-index:10;
  display:flex;align-items:center;justify-content:center;
  font-size:10px;color:var(--text2);transition:all .2s;
}
.sidebar-toggle:hover{color:var(--text);border-color:var(--accent)}
.sidebar.collapsed .sidebar-toggle{transform:translateY(-50%) rotate(180deg)}

.sidebar-label{
  padding:16px 14px 10px;font-size:10px;font-weight:600;letter-spacing:1.2px;
  color:var(--text3);text-transform:uppercase;white-space:nowrap;
}
.sidebar-section{flex:1;display:flex;flex-direction:column;padding:4px 8px;gap:3px}
.side-item{
  display:flex;align-items:center;gap:10px;padding:9px 10px;
  border-radius:8px;font-size:13px;color:var(--text2);
  cursor:pointer;transition:all .15s;border:1px solid transparent;white-space:nowrap;
}
.side-item:hover{color:var(--text);background:var(--surface2)}
.side-item.active{color:var(--text);background:var(--surface3);border-color:var(--border2)}
.side-item svg{width:16px;height:16px;flex-shrink:0;opacity:.65}
.side-item.active svg{opacity:1}
.sidebar.collapsed .side-item span{display:none}
.sidebar.collapsed .sidebar-label{display:none}

.sidebar-placeholder{
  flex:1;display:flex;align-items:center;justify-content:center;
  color:var(--text3);font-size:13px;text-align:center;padding:20px;
}
.sidebar-placeholder svg{width:32px;height:32px;margin-bottom:10px;opacity:.3}

/* ── Main Content ── */
.main{flex:1;overflow-y:auto;padding:28px 32px}
.main::-webkit-scrollbar{width:5px}
.main::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

.page{display:none}
.page.active{display:block}

/* ── Home ── */
.hero{margin-bottom:28px}
.hero h1{
  font-size:28px;font-weight:700;margin-bottom:8px;
  background:linear-gradient(135deg,#c4b5fd,#f0abfc,#fda4af);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1.35;
}
.hero p{font-size:14px;color:var(--text2);line-height:1.7;max-width:520px}

/* ── GEO ── */
.geo-form{display:flex;flex-direction:column;gap:14px;max-width:520px}
.form-label{font-size:12px;font-weight:600;color:var(--text2);margin-bottom:5px;letter-spacing:.3px}
.form-input{
  width:100%;padding:10px 14px;border-radius:8px;
  border:1px solid var(--border2);background:var(--surface2);
  color:var(--text);font-size:14px;outline:none;transition:border .15s;
}
.form-input:focus{border-color:var(--accent)}
.form-input::placeholder{color:var(--text3)}
.model-chips{display:flex;flex-wrap:wrap;gap:6px}
.model-chip{
  padding:6px 12px;border-radius:20px;font-size:12px;
  border:1px solid var(--border2);background:var(--surface2);
  color:var(--text2);cursor:pointer;transition:all .15s;user-select:none;
}
.model-chip:hover{border-color:var(--accent2);color:var(--text)}
.model-chip.selected{background:var(--accent);border-color:var(--accent);color:#fff}
.btn-action{
  padding:10px 20px;border-radius:8px;font-size:13px;font-weight:600;
  background:linear-gradient(135deg,var(--accent),#8b5cf6);color:#fff;
  cursor:pointer;transition:all .15s;align-self:flex-start;border:none;
}
.btn-action:hover{box-shadow:0 4px 16px rgba(124,106,239,.35);transform:translateY(-1px)}
.btn-action:disabled{opacity:.5;cursor:not-allowed;transform:none;box-shadow:none}

.geo-results{margin-top:18px;display:flex;flex-direction:column;gap:10px}
.result-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:10px;padding:14px 16px;display:flex;align-items:center;gap:14px;
  animation:fadeUp .25s ease;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.score-ring{
  width:46px;height:46px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:14px;font-weight:700;border:2.5px solid;
}
.s-high{border-color:var(--green);color:var(--green)}
.s-mid{border-color:var(--orange);color:var(--orange)}
.s-low{border-color:var(--red);color:var(--red)}
.result-info{flex:1;min-width:0}
.result-name{font-size:13px;font-weight:600;margin-bottom:4px}
.result-snippet{font-size:12px;color:var(--text2);line-height:1.4;
  overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.result-tag{padding:3px 8px;border-radius:4px;font-size:11px;font-weight:500;flex-shrink:0}
.t-yes{background:rgba(34,197,94,.12);color:var(--green)}
.t-no{background:rgba(239,68,68,.12);color:var(--red)}

/* ── Compare ── */
.compare-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(195px,1fr));gap:10px}
.price-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:10px;padding:13px 15px;transition:border .15s;
}
.price-card:hover{border-color:var(--accent2)}
.price-card .provider{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.7px;margin-bottom:4px}
.price-card .model{font-size:13px;font-weight:600;margin-bottom:7px}
.price-row{display:flex;justify-content:space-between;font-size:12px;padding:2px 0}
.price-row span:first-child{color:var(--text2)}
.price-row span:last-child{color:var(--text);font-family:'JetBrains Mono',monospace;font-size:11px}
.calc-box{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px;margin-top:18px;max-width:460px}
.calc-box h3{font-size:13px;font-weight:600;margin-bottom:12px;color:var(--text2)}
.calc-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.calc-row label{font-size:12px;color:var(--text2);width:85px;flex-shrink:0}
.calc-row input{flex:1;padding:8px 10px;border-radius:6px;border:1px solid var(--border2);background:var(--surface2);color:var(--text);font-size:12px;outline:none}
.calc-row input:focus{border-color:var(--accent)}
#calcResults{margin-top:10px;font-size:12px;color:var(--text2);line-height:1.75}

/* ── Auth Modal ── */
.modal-overlay{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:200;
  align-items:center;justify-content:center;
}
.modal-overlay.open{display:flex}
.modal-box{
  background:var(--surface);border:1px solid var(--border);
  border-radius:14px;padding:28px;width:340px;max-width:90vw;
}
.modal-box h2{font-size:18px;font-weight:600;margin-bottom:18px;text-align:center}
.modal-box .form-input{margin-bottom:10px}
.modal-box .btn-action{width:100%;text-align:center;margin-top:8px}
.modal-switch{text-align:center;margin-top:14px;font-size:13px;color:var(--text2)}
.modal-switch a{color:var(--accent2);cursor:pointer}

/* ── Responsive ── */
@media(max-width:768px){
  .sidebar{display:none}
  .topbar-nav .nav-item{padding:7px 10px;font-size:12px}
  .topbar-right .btn-ghost,.topbar-right .btn-primary{padding:5px 10px;font-size:11px}
}
</style>
</head>
<body>

<!-- Top Bar -->
<div class="topbar">
  <div class="topbar-brand">

      <svg viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">

<div class="modal-overlay" id="authModal">

// ── Data ──
const MODELS=[

};
const GEO_PROMPT=b=>`请列出你认为在${b}行业中最重要的5个品牌或公司，并简要说明每个品牌的特点和优势。请直接回答，不要提及这是AI生成的内容。`;

// ── Init ──
function init(){
  renderSidebar();
  renderModelChips();
  renderCompareGrid();
  bindEvents();
  applyLang();
  loadUser();
}

function bindEvents(){
  // Top nav
  document.querySelectorAll('.nav-item').forEach(n=>{
    n.addEventListener('click',()=>navigateTo(n.dataset.nav));
  });
  // Sidebar toggle
  document.getElementById('sidebarToggle').addEventListener('click',()=>{
    document.getElementById('sidebar').classList.toggle('collapsed');
  });
  // GEO
  document.getElementById('geoStartBtn').addEventListener('click',startGeo);
  // Calc
  document.getElementById('calcInput').addEventListener('input',calcCosts);
  document.getElementById('calcOutput').addEventListener('input',calcCosts);
  // Auth
  document.getElementById('loginBtn').addEventListener('click',()=>openAuth('login'));
  document.getElementById('registerBtn').addEventListener('click',()=>openAuth('register'));
  document.getElementById('authToggleLink').addEventListener('click',toggleAuthMode);
  document.getElementById('authSubmitBtn').addEventListener('click',submitAuth);
  document.getElementById('authModal').addEventListener('click',e=>{if(e.target===e.currentTarget)closeAuth();});
  // Lang
  document.getElementById('langBtn').addEventListener('click',toggleLang);
}

// ── Navigation ──
function navigateTo(nav){
  currentNav=nav;
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.toggle('active',n.dataset.nav===nav));
  renderSidebar();
  
  // Decide which page to show
  let pageId='page'+capitalize(nav);
  if(nav==='tools'){
    pageId='page'+capitalize(currentTool);
  }
  showPage(pageId);
}

function showPage(id){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  const el=document.getElementById(id);
  if(el) el.classList.add('active');
}

function capitalize(s){return s.charAt(0).toUpperCase()+s.slice(1)}

// ── Sidebar ──
function renderSidebar(){
  const items=SIDEBAR_MAP[currentNav]||[];
  const labelEl=document.getElementById('sidebarLabel');
  const contentEl=document.getElementById('sidebarContent');
  
  if(items.length===0){
    labelEl.style.display='none';
    contentEl.innerHTML=`<div class="sidebar-placeholder">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
        <rect x="2" y="2" width="12" height="12" rx="2"/>
        <path d="M6 6h4M6 10h4"/>
      </svg>
      <span data-i18n="noSub">暂无子功能</span>
    </div>`;
  }else{
    labelEl.style.display='block';
    labelEl.textContent=I18N[lang].subTools;
    contentEl.innerHTML=items.map(item=>`
      <div class="side-item ${item.id===currentTool?'active':''}" data-tool="${item.id}">
        ${item.icon}
        <span data-i18n="${item.labelKey}">${I18N[lang][item.labelKey]}</span>
      </div>
    `).join('');
    contentEl.querySelectorAll('.side-item').forEach(si=>{
      si.addEventListener('click',()=>{
        currentTool=si.dataset.tool;
        document.querySelectorAll('.side-item').forEach(x=>x.classList.remove('active'));
        si.classList.add('active');
        showPage('page'+capitalize(currentTool));
      });
    });
  }
}

// ── Model Chips ──
function renderModelChips(){
  const el=document.getElementById('modelChips');
  el.innerHTML=MODELS.map(m=>`<div class="model-chip" data-model="${m.id}">${m.name}</div>`).join('');
  el.querySelectorAll('.model-chip').forEach(c=>{
    c.addEventListener('click',()=>{
      if(selectedModels.has(c.dataset.model)){
        selectedModels.delete(c.dataset.model);c.classList.remove('selected');
      }else{
        selectedModels.add(c.dataset.model);c.classList.add('selected');
      }
    });
  });
}

// ── GEO ──
async function startGeo(){
  const brand=document.getElementById('brandInput').value.trim();
  if(!brand){document.getElementById('brandInput').focus();return}
  if(selectedModels.size===0){alert(lang==='zh'?'请至少选择一个模型':'Select at least one model');return}
  const btn=document.getElementById('geoStartBtn');
  btn.disabled=true;btn.textContent=I18N[lang].detecting;
  document.getElementById('geoResults').innerHTML='';
  const promises=[...selectedModels].map(mid=>{
    const m=MODELS.find(x=>x.id===mid);
    return detectOne(brand,m).then(r=>showResult(r));
  });
  await Promise.allSettled(promises);
  btn.disabled=false;btn.textContent=I18N[lang].startBtn;
}

async function detectOne(brand,model){
  const key=localStorage.getItem('key_'+model.provider)||'';
  if(!key) return{model:model.name,score:0,mentioned:false,snippet:I18N[lang].noKey,provider:model.provider};
  try{
    const res=await fetch('/api/proxy',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({provider:model.provider,model:model.id,apiKey:key,prompt:GEO_PROMPT(brand)})
    });
    if(!res.ok) throw new Error('HTTP '+res.status);
    const data=await res.json();
    const text=data.content||'';
    const mentioned=text.toLowerCase().includes(brand.toLowerCase());
    return{model:model.name,score:mentioned?Math.floor(60+Math.random()*40):Math.floor(Math.random()*35),mentioned,snippet:text.slice(0,100),provider:model.provider};
  }catch(e){
    return{model:model.name,score:0,mentioned:false,snippet:'Error: '+e.message,provider:model.provider};
  }
}

function showResult(r){
  const cls=r.score>=60?'s-high':r.score>=30?'s-mid':'s-low';
  const tag=r.mentioned
    ?`<span class="result-tag t-yes">${I18N[lang].mentioned}</span>`
    :`<span class="result-tag t-no">${I18N[lang].notMentioned}</span>`;
  document.getElementById('geoResults').insertAdjacentHTML('beforeend',
    `<div class="result-card">
      <div class="score-ring ${cls}">${r.score}</div>
      <div class="result-info">
        <div class="result-name">${r.model}</div>
        <div class="result-snippet">${r.snippet}</div>
      </div>
      ${tag}
    </div>`);
}

// ── Compare ──
function renderCompareGrid(){
  const el=document.getElementById('compareGrid');
  el.innerHTML=MODELS.map(m=>{
    const p=PROVIDERS[m.provider];
    return`<div class="price-card">
      <div class="provider" style="color:${p.color}">${p.name}</div>
      <div class="model">${m.name}</div>
      <div class="price-row"><span>Input</span><span>$${m.in.toFixed(2)}/M</span></div>
      <div class="price-row"><span>Output</span><span>$${m.out.toFixed(2)}/M</span></div>
    </div>`;
  }).join('');
}

function calcCosts(){
  const inp=parseInt(document.getElementById('calcInput').value)||0;
  const out=parseInt(document.getElementById('calcOutput').value)||0;
  const el=document.getElementById('calcResults');
  el.innerHTML=MODELS.map(m=>{
    const cost=inp*m.in/1e6+out*m.out/1e6;
    return`<div style="display:flex;justify-content:space-between"><span>${m.name}</span><span style="font-family:monospace">$${cost.toFixed(4)}</span></div>`;
  }).join('');
}

// ── Auth ──
function openAuth(mode){
  authMode=mode;
  updateAuthUI();
  document.getElementById('authModal').classList.add('open');
}
function closeAuth(){document.getElementById('authModal').classList.remove('open')}
function toggleAuthMode(e){
  e.preventDefault();
  authMode=authMode==='login'?'register':'login';
  updateAuthUI();
}
function updateAuthUI(){
  const t=I18N[lang];
  document.getElementById('authTitle').textContent=authMode==='login'?t.login:t.register;
  document.getElementById('authSubmitBtn').textContent=authMode==='login'?t.login:t.register;
  document.getElementById('authSwitch').innerHTML=`<span>${authMode==='login'?t.noAccount:t.hasAccount||'已有账号？'}</span> <a id="authToggleLink">${authMode==='login'?t.register:t.login}</a>`;
  document.getElementById('authToggleLink').addEventListener('click',toggleAuthMode);
}
async function submitAuth(){
  const user=document.getElementById('authUser').value.trim();
  const pass=document.getElementById('authPass').value;
  if(!user||!pass)return;
  if(authMode==='login'){
    const saved=JSON.parse(localStorage.getItem('u_'+user));
    if(!saved||saved.p!==pass){alert(lang==='zh'?'用户名或密码错误':'Wrong username or password');return}
    localStorage.setItem('currentUser',user);
  }else{
    localStorage.setItem('u_'+user,JSON.stringify({p:pass,n:user}));
    localStorage.setItem('currentUser',user);
  }
  closeAuth();
  loadUser();
}
function loadUser(){
  const u=localStorage.getItem('currentUser');
  const right=document.querySelector('.topbar-right');
  if(u){
    right.innerHTML=`<span style="color:var(--text2);font-size:12px">${u}</span><button class="btn-ghost" id="logoutBtn" data-i18n="logout">退出</button><button class="btn-lang" id="langBtn">${lang==='zh'?'EN':'中文'}</button>`;
    document.getElementById('logoutBtn').addEventListener('click',()=>{localStorage.removeItem('currentUser');loadUser();});
    document.getElementById('langBtn').addEventListener('click',toggleLang);
  }else{
    right.innerHTML=`<button class="btn-ghost" id="loginBtn" data-i18n="login">登录</button><button class="btn-primary" id="registerBtn" data-i18n="register">注册</button><button class="btn-lang" id="langBtn">${lang==='zh'?'EN':'中文'}</button>`;
    document.getElementById('loginBtn').addEventListener('click',()=>openAuth('login'));
    document.getElementById('registerBtn').addEventListener('click',()=>openAuth('register'));
    document.getElementById('langBtn').addEventListener('click',toggleLang);
  }
}

// ── Lang ──
function toggleLang(){
  lang=lang==='zh'?'en':'zh';
  localStorage.setItem('lang',lang);
  applyLang();
  loadUser();
  renderSidebar();
}
function applyLang(){
  const t=I18N[lang];
  document.getElementById('langBtn').textContent=lang==='zh'?'EN':'中文';
  document.querySelectorAll('[data-i18n]').forEach(el=>{
    const key=el.dataset.i18n;
    if(t[key]){
      if(key==='heroTitle'||key==='aiTitle'||key==='geoTitle'||key==='compareTitle'||key==='tradeTitle'||key==='exchangeTitle'){
        el.innerHTML=t[key].replace('\n','<br>');
      }else{
        el.textContent=t[key];
      }
    }
  });
  document.querySelectorAll('[data-placeholder]').forEach(el=>{
    const key=el.dataset.placeholder;
    if(t[key]) el.placeholder=t[key];
  });
}

// ── Start ──
init();
calcCosts();
</script>
</body>
</html>
