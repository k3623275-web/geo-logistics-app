<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>科AI - 超级聚合平台</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0d0d14;--surface:#13131e;--surface2:#1a1a2a;--surface3:#222238;
  --border:#2c2c44;--border2:#383858;--text:#dde1f0;--text2:#8888aa;--text3:#5a5a7a;
  --accent:#7c6aef;--accent2:#a78bfa;--accent-glow:rgba(124,106,239,0.18);
  --green:#22c55e;--red:#ef4444;--orange:#f59e0b;--blue:#3b82f6;
  --topbar-h:54px;--sidebar-w:200px;--sidebar-collapsed:56px;
}
:root.light{
  --bg:#f5f5fa;--surface:#ffffff;--surface2:#f0f0f5;--surface3:#e8e8f0;
  --border:#e0e0ea;--border2:#cccce0;--text:#1a1a2e;--text2:#6666aa;--text3:#9999cc;
}
html,body{height:100%;font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--text);overflow:hidden;user-select:none}

/* Top Bar */
.topbar{
  position:fixed;top:0;left:0;right:0;height:var(--topbar-h);
  background:var(--surface);backdrop-filter:blur(24px);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 18px;z-index:100;
}
.topbar-brand{display:flex;align-items:center;gap:10px;margin-right:16px}
.logo-hex svg{width:28px;height:28px;display:block}
.brand-text{font-size:16px;font-weight:700;letter-spacing:-.3px}
.brand-text span{background:linear-gradient(135deg,#7c6aef,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.topbar-nav{display:flex;gap:2px;flex:1}
.nav-item{
  padding:6px 13px;border-radius:7px;font-size:13px;font-weight:500;
  color:var(--text2);cursor:pointer;transition:all .15s;border:1px solid transparent;
}
.nav-item:hover{color:var(--text);background:var(--surface2)}
.nav-item.active{color:var(--text);background:var(--surface2);border-color:var(--border2)}
.topbar-right{display:flex;align-items:center;gap:8px;margin-left:auto}
.widget-btn{
  width:32px;height:32px;border-radius:7px;background:var(--surface2);
  border:1px solid var(--border);cursor:pointer;display:flex;align-items:center;justify-content:center;
  color:var(--text2);transition:all .15s;
}
.widget-btn:hover{color:var(--text);border-color:var(--accent)}
.widget-btn svg{width:16px;height:16px}
.widget-panel{
  position:fixed;top:calc(var(--topbar-h) + 8px);right:18px;
  width:240px;background:var(--surface);border:1px solid var(--border);
  border-radius:12px;padding:8px;z-index:200;display:none;
  box-shadow:0 8px 32px rgba(0,0,0,.3);
}
.widget-panel.open{display:block}
.widget-panel-item{
  display:flex;align-items:center;gap:10px;padding:9px 10px;
  border-radius:7px;font-size:13px;color:var(--text2);cursor:pointer;transition:all .12s;
}
.widget-panel-item:hover{background:var(--surface2);color:var(--text)}
.widget-panel-item svg{width:15px;height:15px;flex-shrink:0;opacity:.65}
.widget-panel-divider{height:1px;background:var(--border);margin:6px 0}
.btn-ghost{padding:6px 13px;border-radius:6px;font-size:12px;font-weight:500;border:1px solid var(--border2);color:var(--text2);cursor:pointer;transition:all .15s}
.btn-ghost:hover{color:var(--text);border-color:var(--accent2)}
.btn-primary{padding:6px 13px;border-radius:6px;font-size:12px;font-weight:500;background:var(--accent);color:#fff;cursor:pointer;border:none;transition:all .15s}
.btn-primary:hover{background:var(--accent2);box-shadow:0 2px 12px var(--accent-glow)}

/* Layout */
.body{display:flex;height:100vh;padding-top:var(--topbar-h)}
.sidebar{width:var(--sidebar-w);flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;transition:width .2s ease;overflow:hidden;position:relative}
.sidebar.collapsed{width:var(--sidebar-collapsed)}
.sidebar-toggle{position:absolute;right:-12px;top:50%;transform:translateY(-50%);width:24px;height:24px;border-radius:50%;background:var(--surface2);border:1px solid var(--border);cursor:pointer;z-index:10;display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--text2);transition:all .2s}
.sidebar-toggle:hover{color:var(--text);border-color:var(--accent)}
.sidebar.collapsed .sidebar-toggle{transform:translateY(-50%) rotate(180deg)}
.sidebar-label{padding:16px 14px 10px;font-size:10px;font-weight:600;letter-spacing:1.2px;color:var(--text3);text-transform:uppercase;white-space:nowrap}
.sidebar-section{flex:1;display:flex;flex-direction:column;padding:4px 8px;gap:3px}
.side-item{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:8px;font-size:13px;color:var(--text2);cursor:pointer;transition:all .15s;border:1px solid transparent;white-space:nowrap}
.side-item:hover{color:var(--text);background:var(--surface2)}
.side-item.active{color:var(--text);background:var(--surface3);border-color:var(--border2)}
.side-item svg{width:16px;height:16px;flex-shrink:0;opacity:.65}
.side-item.active svg{opacity:1}
.sidebar.collapsed .side-item span,.sidebar.collapsed .sidebar-label{display:none}
.sidebar-placeholder{flex:1;display:flex;align-items:center;justify-content:center;color:var(--text3);font-size:13px;text-align:center;padding:20px}
.main{flex:1;overflow-y:auto;padding:28px 32px}
.main::-webkit-scrollbar{width:5px}
.main::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
.page{display:none}
.page.active{display:block}

/* Home - AI Chat */
.home-chat{
  max-width:600px;margin:0 auto 32px;background:var(--surface);
  border:1px solid var(--border);border-radius:14px;padding:20px;
}
.chat-header{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.chat-header svg{width:24px;height:24px;color:var(--accent)}
.chat-header h2{font-size:16px;font-weight:600}
.chat-input-wrap{display:flex;gap:8px}
.chat-input{
  flex:1;padding:12px 14px;border-radius:8px;border:1px solid var(--border2);
  background:var(--surface2);color:var(--text);font-size:14px;outline:none;resize:none;
}
.chat-input:focus{border-color:var(--accent)}
.chat-send{
  padding:12px 18px;border-radius:8px;background:var(--accent);color:#fff;
  border:none;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;
}
.chat-send:hover{background:var(--accent2)}
.chat-response{
  margin-top:14px;padding:14px;background:var(--surface2);
  border-radius:8px;font-size:14px;line-height:1.7;color:var(--text);
  display:none;
}
.chat-response.open{display:block}

/* Home - Features */
.home-features{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px}
.feature-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:12px;padding:18px;cursor:pointer;transition:all .2s;
}
.feature-card:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:0 6px 20px var(--accent-glow)}
.feature-card .icon{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;margin-bottom:12px}
.feature-card .icon svg{width:20px;height:20px}
.feature-card h3{font-size:14px;font-weight:600;margin-bottom:6px}
.feature-card p{font-size:12px;color:var(--text2);line-height:1.5}

/* GEO */
.geo-form{display:flex;flex-direction:column;gap:14px;max-width:520px}
.form-label{font-size:12px;font-weight:600;color:var(--text2);margin-bottom:5px;letter-spacing:.3px}
.form-input{width:100%;padding:10px 14px;border-radius:8px;border:1px solid var(--border2);background:var(--surface2);color:var(--text);font-size:14px;outline:none;transition:border .15s}
.form-input:focus{border-color:var(--accent)}
.form-input::placeholder{color:var(--text3)}
.model-chips{display:flex;flex-wrap:wrap;gap:6px}
.model-chip{padding:6px 12px;border-radius:20px;font-size:12px;border:1px solid var(--border2);background:var(--surface2);color:var(--text2);cursor:pointer;transition:all .15s;user-select:none}
.model-chip:hover{border-color:var(--accent2);color:var(--text)}
.model-chip.selected{background:var(--accent);border-color:var(--accent);color:#fff}
.btn-action{padding:10px 20px;border-radius:8px;font-size:13px;font-weight:600;background:linear-gradient(135deg,var(--accent),#8b5cf6);color:#fff;cursor:pointer;transition:all .15s;align-self:flex-start;border:none}
.btn-action:hover{box-shadow:0 4px 16px rgba(124,106,239,.35);transform:translateY(-1px)}
.btn-action:disabled{opacity:.5;cursor:not-allowed;transform:none;box-shadow:none}
.geo-results{margin-top:18px;display:flex;flex-direction:column;gap:10px}
.result-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 16px;display:flex;align-items:center;gap:14px;animation:fadeUp .25s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.score-ring{width:46px;height:46px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;border:2.5px solid}
.s-high{border-color:var(--green);color:var(--green)}
.s-mid{border-color:var(--orange);color:var(--orange)}
.s-low{border-color:var(--red);color:var(--red)}
.result-info{flex:1;min-width:0}
.result-name{font-size:13px;font-weight:600;margin-bottom:4px}
.result-snippet{font-size:12px;color:var(--text2);line-height:1.4;overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.result-tag{padding:3px 8px;border-radius:4px;font-size:11px;font-weight:500;flex-shrink:0}
.t-yes{background:rgba(34,197,94,.12);color:var(--green)}
.t-no{background:rgba(239,68,68,.12);color:var(--red)}

/* Compare - Model Selection */
.compare-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.compare-header h3{font-size:14px;font-weight:600}
.compare-counter{font-size:12px;color:var(--text3)}
.compare-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:8px}
.price-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;transition:all .15s;cursor:pointer;position:relative}
.price-card:hover{border-color:var(--accent2)}
.price-card.selected{border-color:var(--accent);background:var(--surface2)}
.price-card .check{position:absolute;top:8px;right:8px;width:18px;height:18px;border-radius:50%;border:2px solid var(--border2);display:flex;align-items:center;justify-content:center}
.price-card.selected .check{border-color:var(--accent);background:var(--accent)}
.price-card.selected .check svg{display:block}
.price-card .check svg{width:12px;height:12px;color:#fff;display:none}
.price-card .provider{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.7px;margin-bottom:4px}
.price-card .model{font-size:13px;font-weight:600;margin-bottom:6px}
.price-row{display:flex;justify-content:space-between;font-size:11px;padding:2px 0}
.price-row span:first-child{color:var(--text2)}
.price-row span:last-child{color:var(--text);font-family:monospace}

/* Compare - Table */
.compare-table-wrap{margin-top:20px;display:none}
.compare-table-wrap.open{display:block}
.compare-table{width:100%;border-collapse:collapse;font-size:12px}
.compare-table th,.compare-table td{padding:10px 12px;text-align:left;border-bottom:1px solid var(--border)}
.compare-table th{font-weight:600;color:var(--text2);background:var(--surface2)}
.compare-table td{color:var(--text)}
.compare-table tr:hover td{background:var(--surface2)}
.compare-table .model-name{font-weight:600}

/* Compare - Suggestions */
.compare-suggestions{margin-top:18px;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px}
.compare-suggestions h4{font-size:13px;font-weight:600;margin-bottom:12px;color:var(--text2)}
.suggestion-list{display:flex;flex-direction:column;gap:8px}
.suggestion-item{display:flex;align-items:flex-start;gap:10px;padding:10px;background:var(--surface2);border-radius:8px}
.suggestion-item svg{width:16px;height:16px;flex-shrink:0;margin-top:1px}
.suggestion-item .content{flex:1}
.suggestion-item .title{font-size:12px;font-weight:600;margin-bottom:3px}
.suggestion-item .desc{font-size:11px;color:var(--text2);line-height:1.5}

/* Files */
.file-list{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;max-width:560px}
.file-item{display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px solid var(--border);font-size:13px;transition:background .1s}
.file-item:last-child{border-bottom:none}
.file-item:hover{background:var(--surface2)}
.file-item svg{width:18px;height:18px;opacity:.5;flex-shrink:0}
.file-name{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.file-meta{color:var(--text3);font-size:12px;flex-shrink:0}
.file-empty{text-align:center;padding:32px;color:var(--text3);font-size:13px}
.file-toolbar{display:flex;gap:8px;margin-bottom:14px;max-width:560px}
.file-toolbar .btn-action{padding:8px 16px;font-size:12px}

/* Auth Modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:300;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal-box{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:28px;width:340px;max-width:90vw}
.modal-box h2{font-size:18px;font-weight:600;margin-bottom:18px;text-align:center}
.modal-box .form-input{margin-bottom:10px}
.modal-box .btn-action{width:100%;text-align:center;margin-top:8px}
.modal-switch{text-align:center;margin-top:14px;font-size:13px;color:var(--text2)}
.modal-switch a{color:var(--accent2);cursor:pointer}

/* Hero */
.hero{margin-bottom:28px}
.hero h1{font-size:28px;font-weight:700;margin-bottom:8px;background:linear-gradient(135deg,#7c6aef,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1.35}
.hero p{font-size:14px;color:var(--text2);line-height:1.7;max-width:520px}

/* Responsive */
@media(max-width:768px){
  .sidebar{display:none}
  .topbar-nav .nav-item{padding:6px 10px;font-size:12px}
  .home-features{grid-template-columns:1fr}
}
</style>
</head>
<body>

<!-- Top Bar -->
<div class="topbar">
  <div class="topbar-brand">
    <div class="logo-hex">
      <svg viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
        <polygon points="14,1 18.2,8 26,10 21,16 22,24 14,20.5 6,24 7,16 2,10 9.8,8" stroke="var(--text)" stroke-width="1.1" fill="none"/>
      </svg>
    </div>
    <div class="brand-text"><span>科AI</span></div>
  </div>
  <div class="topbar-nav">
    <div class="nav-item active" data-nav="home"><span data-i18n="navHome">首页</span></div>
    <div class="nav-item" data-nav="ai"><span data-i18n="navAI">AI</span></div>
    <div class="nav-item" data-nav="tools"><span data-i18n="navTools">工具</span></div>
    <div class="nav-item" data-nav="market"><span data-i18n="navMarket">市场</span></div>
    <div class="nav-item" data-nav="trade"><span data-i18n="navTrade">交易</span></div>
    <div class="nav-item" data-nav="community"><span data-i18n="navCommunity">社区</span></div>
    <div class="nav-item" data-nav="personal"><span data-i18n="navPersonal">个人</span></div>
  </div>
  <div class="topbar-right">
    <button class="widget-btn" id="widgetBtn" title="更多">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
        <circle cx="8" cy="8" r="2.2"/><path d="M8 1v2M8 13v2M1 8h2M13 8h2M2.9 2.9l1.4 1.4M11.7 11.7l1.4 1.4M2.9 13.1l1.4-1.4M11.7 4.3l1.4-1.4"/>
      </svg>
    </button>
    <button class="btn-ghost" id="loginBtn" data-i18n="login">登录</button>
    <button class="btn-primary" id="registerBtn" data-i18n="register">注册</button>
  </div>
</div>

<!-- Widget Panel -->
<div class="widget-panel" id="widgetPanel">
  <div class="widget-panel-item" id="wpContact"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 12V4.5L8 2l6 2.5V12l-5 3-1-1.5M8 8v3M6 10.5h4"/></svg><span data-i18n="wpContact">联系客服</span></div>
  <div class="widget-panel-item" id="wpFeedback"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 2h12v9H9l-3 3v-3H2V2z"/><path d="M5 6h6M5 9h4"/></svg><span data-i18n="wpFeedback">意见反馈</span></div>
  <div class="widget-panel-item" id="wpMessage"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 3h12v8H9l-3 2v-2H2V3z"/></svg><span data-i18n="wpMessage">站内消息</span></div>
  <div class="widget-panel-item" id="wpNotice"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M8 2a5 5 0 00-5 5v3l-1.5 2h13L13 10V7a5 5 0 00-5-5zM6.5 13h3"/></svg><span data-i18n="wpNotice">系统公告</span></div>
  <div class="widget-panel-divider"></div>
  <div class="widget-panel-item" id="wpLang"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="8" r="6.5"/><path d="M1.5 8h13M8 1.5c-2 2-3 4.5-3 6.5s1 4.5 3 6.5M8 1.5c2 2 3 4.5 3 6.5s-1 4.5-3 6.5"/></svg><span data-i18n="wpLang">语言切换</span><span style="margin-left:auto;font-size:11px;color:var(--text3)" id="langCurrent">中文</span></div>
  <div class="widget-panel-item" id="wpTheme"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="8" r="3.5"/><path d="M8 1v2M8 13v2M1 8h2M13 8h2M3.1 3.1l1.4 1.4M11.5 11.5l1.4 1.4M3.1 12.9l1.4-1.4M11.5 4.5l1.4-1.4"/></svg><span id="themeLabel" data-i18n="wpThemeDark">切换浅色</span></div>
</div>

<!-- Body -->
<div class="body">
  <div class="sidebar" id="sidebar">
    <button class="sidebar-toggle" id="sidebarToggle">◀</button>
    <div class="sidebar-label" id="sidebarLabel" data-i18n="subTools">子工具</div>
    <div class="sidebar-section" id="sidebarContent"></div>
  </div>

  <div class="main">
    <!-- Home -->
    <div class="page active" id="pageHome">
      <div class="home-chat">
        <div class="chat-header">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 2a8 8 0 00-8 8v4l-2 2h20l-2-2v-4a8 8 0 00-8-8z"/><path d="M9 14v2M15 14v2"/></svg>
          <h2 data-i18n="chatTitle">智能AI助手</h2>
        </div>
        <div class="chat-input-wrap">
          <textarea class="chat-input" id="chatInput" rows="2" data-placeholder="chatPh" placeholder="输入您的问题，按回车发送..."></textarea>
          <button class="chat-send" id="chatSend" data-i18n="send">发送</button>
        </div>
        <div class="chat-response" id="chatResponse"></div>
      </div>
      <div class="home-features" id="homeFeatures"></div>
    </div>

    <div class="page" id="pageAI"><div class="hero"><h1 data-i18n="aiTitle">AI智能体</h1><p data-i18n="aiSub">AI大栏目内容，敬请期待。</p></div></div>

    <!-- GEO -->
    <div class="page" id="pageGeo">
      <div class="hero" style="margin-bottom:18px">
        <h1 style="font-size:20px" data-i18n="geoTitle">GEO可见性检测</h1>
        <p style="font-size:13px" data-i18n="geoSub">输入品牌，选择模型，检测AI搜索提及情况。</p>
      </div>
      <div class="geo-form">
        <div><div class="form-label" data-i18n="brandLabel">品牌名称</div><input class="form-input" id="brandInput" data-placeholder="brandPh" placeholder="例如：华为、特斯拉"></div>
        <div><div class="form-label" data-i18n="modelLabel">选择模型（可多选）</div><div class="model-chips" id="modelChips"></div></div>
        <button class="btn-action" id="geoStartBtn" data-i18n="startBtn">开始检测</button>
      </div>
      <div class="geo-results" id="geoResults"></div>
    </div>

    <!-- Compare -->
    <div class="page" id="pageCompare">
      <div class="hero" style="margin-bottom:18px">
        <h1 style="font-size:20px" data-i18n="compareTitle">AI模型比价</h1>
        <p style="font-size:13px" data-i18n="compareSub">选择最多6个模型进行全方位对比。</p>
      </div>
      <div class="compare-header">
        <h3 data-i18n="selectModels">选择模型对比</h3>
        <span class="compare-counter"><span id="selectedCount">0</span>/6</span>
      </div>

function navigateTo(nav){
  currentNav=nav;
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.toggle('active',n.dataset.nav===nav));
  renderSidebar();
  let pageId='page'+capitalize(nav);
  if(nav==='tools')pageId='page'+capitalize(currentTool);
  if(nav==='personal')pageId='pagePersonal';
  showPage(pageId);
}
function showPage(id){document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));const el=document.getElementById(id);if(el)el.classList.add('active')}
function capitalize(s){return s.charAt(0).toUpperCase()+s.slice(1)}

function renderSidebar(){
  const items=SIDEBAR_MAP[currentNav]||[];
  const labelEl=document.getElementById('sidebarLabel');
  const contentEl=document.getElementById('sidebarContent');
  if(items.length===0){labelEl.style.display='none';contentEl.innerHTML='<div class="sidebar-placeholder">暂无子功能</div>'}
  else{
    labelEl.style.display='block';labelEl.textContent=I18N[lang].subTools;
    contentEl.innerHTML=items.map(item=>`<div class="side-item" data-tool="${item.id}">${item.icon}<span data-i18n="${item.labelKey}">${I18N[lang][item.labelKey]}</span></div>`).join('');
    contentEl.querySelectorAll('.side-item').forEach(si=>si.addEventListener('click',()=>{
      if(si.dataset.tool==='files'){showPage('pagePersonal');return}
      currentTool=si.dataset.tool;
      document.querySelectorAll('.side-item').forEach(x=>x.classList.remove('active'));
      si.classList.add('active');
      showPage('page'+capitalize(currentTool));
    }));
  }
}

      <p data-i18n="${f.descKey}">${I18N[lang][f.descKey]}</p>

function sendChat(){
  const input=document.getElementById('chatInput');
  const msg=input.value.trim();
  if(!msg)return;
  const res=document.getElementById('chatResponse');
  res.classList.add('open');
  res.innerHTML=`<div style="color:var(--text3);font-size:12px;margin-bottom:8px">您：${msg}</div><div>这是一个演示回复。在真实场景中，这里会连接AI模型返回智能回答。您的问题已被记录。</div>`;
  input.value='';
}

function renderModelChips(){
  const el=document.getElementById('modelChips');

  el.querySelectorAll('.model-chip').forEach(c=>c.addEventListener('click',()=>{
    if(selectedGeoModels.has(c.dataset.model)){selectedGeoModels.delete(c.dataset.model);c.classList.remove('selected')}
    else{selectedGeoModels.add(c.dataset.model);c.classList.add('selected')}
  }));
}

async function startGeo(){
  const brand=document.getElementById('brandInput').value.trim();
  if(!brand){document.getElementById('brandInput').focus();return}
  if(selectedGeoModels.size===0){alert(lang==='zh'?'请至少选择一个模型':'Select at least one model');return}
  const btn=document.getElementById('geoStartBtn');
  btn.disabled=true;btn.textContent=I18N[lang].detecting;
  document.getElementById('geoResults').innerHTML='';
  const promises=[...selectedGeoModels].map(mid=>{
    const m=GEO_MODELS.find(x=>x.id===mid);
    return detectOne(brand,m).then(r=>showResult(r));
  });
  await Promise.allSettled(promises);
  btn.disabled=false;btn.textContent=I18N[lang].startBtn;
}
async function detectOne(brand,model){
  const key=localStorage.getItem('key_'+model.provider)||'';
  if(!key)return{model:model.name,score:0,mentioned:false,snippet:I18N[lang].noKey,provider:model.provider};
  try{
    const res=await fetch('/api/proxy',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({provider:model.provider,model:model.id,apiKey:key,prompt:GEO_PROMPT(brand)})});
    if(!res.ok)throw new Error('HTTP '+res.status);
    const data=await res.json();
    const text=data.content||'';
    const mentioned=text.toLowerCase().includes(brand.toLowerCase());
    return{model:model.name,score:mentioned?Math.floor(60+Math.random()*40):Math.floor(Math.random()*35),mentioned,snippet:text.slice(0,100),provider:model.provider};
  }catch(e){return{model:model.name,score:0,mentioned:false,snippet:'Error: '+e.message,provider:model.provider}}
}
function showResult(r){
  const cls=r.score>=60?'s-high':r.score>=30?'s-mid':'s-low';
  const tag=r.mentioned?`<span class="result-tag t-yes">${I18N[lang].mentioned}</span>`:`<span class="result-tag t-no">${I18N[lang].notMentioned}</span>`;
  document.getElementById('geoResults').insertAdjacentHTML('beforeend',`<div class="result-card"><div class="score-ring ${cls}">${r.score}</div><div class="result-info"><div class="result-name">${r.model}</div><div class="result-snippet">${r.snippet}</div></div>${tag}</div>`);
}

function renderCompareGrid(){
  const el=document.getElementById('compareGrid');
  el.innerHTML=MODELS.map(m=>{
    const p=PROVIDERS[m.provider];
    return`<div class="price-card" data-model="${m.id}">
      <div class="check"><svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 6l3 3 5-5"/></svg></div>
      <div class="provider" style="color:${p.color}">${p.name}</div>
      <div class="model">${m.name}</div>
      <div class="price-row"><span>Input</span><span>$${m.in.toFixed(2)}/M</span></div>
      <div class="price-row"><span>Output</span><span>$${m.out.toFixed(2)}/M</span></div>
    </div>`;
  }).join('');
  el.querySelectorAll('.price-card').forEach(c=>c.addEventListener('click',()=>{
    const mid=c.dataset.model;
    if(selectedCompareModels.has(mid)){selectedCompareModels.delete(mid);c.classList.remove('selected')}
    else if(selectedCompareModels.size<6){selectedCompareModels.add(mid);c.classList.add('selected')}
    updateCompareTable();
  }));
}

function updateCompareTable(){
  const countEl=document.getElementById('selectedCount');
  const tableWrap=document.getElementById('compareTableWrap');
  const table=document.getElementById('compareTable');
  const suggestionsEl=document.getElementById('compareSuggestions');
  countEl.textContent=selectedCompareModels.size;
  if(selectedCompareModels.size===0){tableWrap.classList.remove('open');suggestionsEl.style.display='none';return}
  tableWrap.classList.add('open');
  const models=[...selectedCompareModels].map(id=>MODELS.find(m=>m.id===id));
  const headers=['模型','Input价格','Output价格','上下文','MMLU','HumanEval','MATH','SWE-bench'];
  table.innerHTML=`<thead><tr>${headers.map(h=>`<th>${h}</th>`).join('')}</tr></thead><tbody>${models.map(m=>`
    <tr>
      <td class="model-name">${m.name}</td>
      <td>$${m.in.toFixed(2)}/M</td>
      <td>$${m.out.toFixed(2)}/M</td>
      <td>${m.ctx}K</td>
      <td>${m.bench.mmlu}%</td>
      <td>${m.bench.humaneval}%</td>
      <td>${m.bench.math}%</td>
      <td>${m.bench.swe}%</td>
    </tr>`).join('')}</tbody>`;
  suggestionsEl.style.display='block';
  const list=document.getElementById('suggestionList');
  list.innerHTML=models.map(m=>`
    <div class="suggestion-item">
      <svg viewBox="0 0 16 16" fill="none" stroke="var(--accent)" stroke-width="1.5"><circle cx="8" cy="8" r="6"/><path d="M8 5v3l2 2"/></svg>
      <div class="content"><div class="title">${m.name} — ${m.positioning}</div><div class="desc">${m.advice}</div></div>
    </div>
  `).join('');
}

function renderFileList(){
  const el=document.getElementById('fileList');
  const files=JSON.parse(localStorage.getItem('files')||'[]');
  if(files.length===0)el.innerHTML='<div class="file-empty">暂无文件，点击新建文件开始</div>';
  else el.innerHTML=files.map(f=>`<div class="file-item"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 2h12v9H9l-3 3v-3H2V2z"/></svg><span class="file-name">${f.name}</span><span class="file-meta">${f.date||''}</span></div>`).join('');
}
function newFile(){
  const name=prompt(lang==='zh'?'输入文件名：':'Enter filename:','新文档.txt');
  if(!name)return;
  const files=JSON.parse(localStorage.getItem('files')||'[]');
  files.unshift({name,content:'',date:new Date().toLocaleDateString()});
  localStorage.setItem('files',JSON.stringify(files));
  renderFileList();
}
function importFile(){
  const inp=document.createElement('input');inp.type='file';inp.accept='.txt,.md,.json,.csv';
  inp.onchange=()=>{
    const file=inp.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=()=>{
      const files=JSON.parse(localStorage.getItem('files')||'[]');
      files.unshift({name:file.name,content:reader.result,date:new Date().toLocaleDateString()});
      localStorage.setItem('files',JSON.stringify(files));
      renderFileList();
    };
    reader.readAsText(file);
  };
  inp.click();
}

function openAuth(mode){authMode=mode;updateAuthUI();document.getElementById('authModal').classList.add('open')}
function closeAuth(){document.getElementById('authModal').classList.remove('open')}
function toggleAuthMode(e){e.preventDefault();authMode=authMode==='login'?'register':'login';updateAuthUI()}
function updateAuthUI(){
  const t=I18N[lang];
  document.getElementById('authTitle').textContent=authMode==='login'?t.login:t.register;
  document.getElementById('authSubmitBtn').textContent=authMode==='login'?t.login:t.register;
  document.getElementById('authSwitch').innerHTML=`<span>${authMode==='login'?t.noAccount:'已有账号？'}</span> <a id="authToggleLink">${authMode==='login'?t.register:t.login}</a>`;
  document.getElementById('authToggleLink').addEventListener('click',toggleAuthMode);
}
function submitAuth(){
  const user=document.getElementById('authUser').value.trim();
  const pass=document.getElementById('authPass').value;
  if(!user||!pass)return;
  if(authMode==='login'){
    const saved=JSON.parse(localStorage.getItem('u_'+user)||'null');
    if(!saved||saved.p!==pass){alert(lang==='zh'?'用户名或密码错误':'Wrong username or password');return}
    localStorage.setItem('currentUser',user);
  }else{localStorage.setItem('u_'+user,JSON.stringify({p:pass,n:user}));localStorage.setItem('currentUser',user)}
  closeAuth();loadUser();
}
function loadUser(){
  const u=localStorage.getItem('currentUser');
  const right=document.querySelector('.topbar-right');
  if(u){
    right.innerHTML=`<button class="widget-btn" id="widgetBtn"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="8" r="2.2"/><path d="M8 1v2M8 13v2M1 8h2M13 8h2M2.9 2.9l1.4 1.4M11.7 11.7l1.4 1.4M2.9 13.1l1.4-1.4M11.7 4.3l1.4-1.4"/></svg></button><span style="font-size:12px;color:var(--text2)">${u}</span><button class="btn-ghost" id="logoutBtn">${I18N[lang].logout}</button>`;
    document.getElementById('widgetBtn').addEventListener('click',toggleWidget);
    document.getElementById('logoutBtn').addEventListener('click',()=>{localStorage.removeItem('currentUser');loadUser()});
  }else{
    right.innerHTML=`<button class="widget-btn" id="widgetBtn"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="8" r="2.2"/><path d="M8 1v2M8 13v2M1 8h2M13 8h2M2.9 2.9l1.4 1.4M11.7 11.7l1.4 1.4M2.9 13.1l1.4-1.4M11.7 4.3l1.4-1.4"/></svg></button><button class="btn-ghost" id="loginBtn">${I18N[lang].login}</button><button class="btn-primary" id="registerBtn">${I18N[lang].register}</button>`;
    document.getElementById('widgetBtn').addEventListener('click',toggleWidget);
    document.getElementById('loginBtn').addEventListener('click',()=>openAuth('login'));
    document.getElementById('registerBtn').addEventListener('click',()=>openAuth('register'));
  }
}

function toggleWidget(e){e.stopPropagation();document.getElementById('widgetPanel').classList.toggle('open')}
function applyThemeUI(){
  document.getElementById('langCurrent').textContent=lang==='zh'?'中文':'English';
  const themeLabel=document.getElementById('themeLabel');
  themeLabel.textContent=theme==='dark'?I18N[lang].wpThemeDark:I18N[lang].wpThemeLight;
}
function toggleTheme(){
  theme=theme==='dark'?'light':'dark';
  localStorage.setItem('theme',theme);
  applyTheme();
  applyThemeUI();
  document.getElementById('widgetPanel').classList.remove('open');
}
function applyTheme(){document.documentElement.classList.toggle('light',theme==='light')}
function toggleLang(){
  lang=lang==='zh'?'en':'zh';
  localStorage.setItem('lang',lang);
  applyLang();applyThemeUI();renderSidebar();renderFeatures();loadUser();
  document.getElementById('widgetPanel').classList.remove('open');
}
function applyLang(){
  const t=I18N[lang];
  document.querySelectorAll('[data-i18n]').forEach(el=>{
    const key=el.dataset.i18n;
    if(t[key])el.textContent=t[key];
  });
  document.querySelectorAll('[data-placeholder]').forEach(el=>{const key=el.dataset.placeholder;if(t[key])el.placeholder=t[key]});
}

init();
</script>
</body>
</html>
